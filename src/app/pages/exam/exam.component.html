<div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" matSort>
        
        <ng-container matColumnDef="idExam">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
            <td mat-cell *matCellDef="let row"> {{row.idExam}} </td>
        </ng-container>

        <ng-container matColumnDef="nameExam">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> NOMBRE </th>
            <td mat-cell *matCellDef="let row"> {{row.nameExam}} </td>
        </ng-container>

        <ng-container matColumnDef="descriptionExam">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> DESCRIPCION </th>
            <td mat-cell *matCellDef="let row"> {{row.descriptionExam}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> ACTIONS </th>
            <td mat-cell *matCellDef="let row">
                <button matButton [routerLink]="['edit', row.idExam]">
                    <mat-icon>mode_edit</mat-icon>
                </button>
                <button matButton color="accent" (click)="delete(row.idExam)">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="getDisplayedColumns()"></tr>
        <tr mat-row *matRowDef="let row; columns: getDisplayedColumns()"></tr>
        
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" [length]="totalElements" (page)="showMore($event)" aria-label="Select page of exams"></mat-paginator>

</div>
